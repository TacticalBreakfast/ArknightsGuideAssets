name: Process Characters

on:
  push:
    paths:
      - 'excel-en/**'
      - 'excel-cn/**'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install Dependencies
        run: pip install pyyaml

      - name: Run Character Parser
        run: python3 parse_characters.py

      - name: Commit and Push Output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add processed/characters.yml

          if git diff --staged --quiet; then
            echo "No changes to characters.yml. Nothing to commit."
          else
            echo "Changes found. Committing and pushing..."
            git commit -m "Auto-update characters.yml from excel data"
            git push
          fi
